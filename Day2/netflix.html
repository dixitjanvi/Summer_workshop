<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Example</title>
    <link rel="stylesheet" href="netflix font.css">
</head>
<!-- internal css
<style>
    p{
        background-color: aqua;
    }
</style> -->
<body>

    <h1>Welcome to My Page</h1>

    <div class="first">
        Discover amazing places and unforgettable experiences.
    </div>

    <div class="netflix">
        NETFLIX
    </div>

    <div class="card">
       <div class="top">
          <img src="https://images.pexels.com/photos/8079829/pexels-photo-8079829.jpeg" alt="Shoes">
       </div>

       <div class="bottom">
          <h1>Red Tape Premium Shoes for Boys</h1>
          <p>Size: 8</p>
          <p>Price: ₹5000</p>
       </div>
    </div>

    <div class="box">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
        <div class="four">4</div>
        <div class="five">5</div>
    </div>

</body>
</html>
